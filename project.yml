# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: AIInteriorDesign
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  AIInteriorDesign:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Room Styler"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "AIInteriorDesign uses the camera to capture and process your content."
        NSPhotoLibraryUsageDescription: "AIInteriorDesign needs access to your photos to import and process images."
        NSPhotoLibraryAddUsageDescription: "AIInteriorDesign saves your results to your photo library."
    settings:
      base:
        PRODUCT_NAME: AIInteriorDesign
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.aiinteriordesign
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AIInteriorDesignTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/InteriorService.swift
    settings:
      base:
        PRODUCT_NAME: AIInteriorDesignTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.aiinteriordesign.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        AIInteriorDesignTests: [test]
    test:
      targets:
        - AIInteriorDesignTests
